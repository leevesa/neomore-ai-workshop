services:
  workshop-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workshop-hub
    ports:
      - "8080:8080"
    environment:
      # Shared workshop password. When set, write endpoints and the dashboard
      # require it (the dashboard prompts via HTTP Basic auth). Defaults to
      # "local"; export WORKSHOP_PASSWORD to override, or set it empty to run a
      # fully open local/dry-run hub.
      WORKSHOP_PASSWORD: ${WORKSHOP_PASSWORD:-local}
    networks:
      - workshop
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

networks:
  workshop:
    driver: bridge
