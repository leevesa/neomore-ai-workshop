# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: fi.neomore.template
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: http://abapdeploy.com
          client: '100'
        app:
          name: ZPP_TEST
          description: Test deployment config
          package: ZPACKAGE
          transport: TR241321
        exclude:
          - /test/
