_schema-version: '3.2'
ID: fineomoretemplate
description: Template Fiori application.
version: 1.0.0
modules:
  - name: fineomoretemplate-destination-content
    type: com.sap.application.content
    requires:
      - name: fineomoretemplate-destination-service
        parameters:
          content-target: true
      - name: fineomoretemplate-repo-host
        parameters:
          service-key:
            name: fineomoretemplate-repo-host-key
      - name: fineomoretemplate-uaa
        parameters:
          service-key:
            name: fineomoretemplate-uaa-key
    parameters:
      content:
        instance:
          destinations:
            - Name: fineomoretemplate_html_repo_host
              ServiceInstanceName: fineomoretemplate-html5-srv
              ServiceKeyName: fineomoretemplate-repo-host-key
              sap.cloud.service: fineomoretemplate
            - Authentication: OAuth2UserTokenExchange
              Name: fineomoretemplate_uaa
              ServiceInstanceName: fineomoretemplate-xsuaa-srv
              ServiceKeyName: fineomoretemplate-uaa-key
              sap.cloud.service: fineomoretemplate
          existing_destinations_policy: ignore
    build-parameters:
      no-source: true
  - name: fineomoretemplate-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: fineomoretemplate-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - fineomoretemplate.zip
          name: fineomoretemplate
          target-path: resources/
  - name: fineomoretemplate
    type: html5
    path: .
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []
resources:
  - name: fineomoretemplate-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
            existing_destinations_policy: update
        version: 1.0.0
      service: destination
      service-name: fineomoretemplate-destination-service
      service-plan: lite
  - name: fineomoretemplate-uaa
    type: org.cloudfoundry.managed-service
    parameters:
      path: ./xs-security.json
      service: xsuaa
      service-name: fineomoretemplate-xsuaa-srv
      service-plan: application
  - name: fineomoretemplate-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: fineomoretemplate-html5-srv
      service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
